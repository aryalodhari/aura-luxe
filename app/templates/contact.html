{% extends "base.html" %}

{% block title %}Contact Us - Aura by Honeyy{% endblock %}

{% block content %}
    <section class="page-hero"><h1>Contact Us</h1></section>
    
    <div class="row p-3 m-1">
        <div class="col-md-6">
            {% if success %}
                <div class="alert alert-success">
                    {{ success }}
                </div>
            {% endif %}
            
            <h3>Send us a Message</h3>
            
            <form method="POST">
                <div class="mb-3">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone" class="form-control">
                </div>
                
                <div class="mb-3">
                    <label for="subject">Subject:</label>
                    <input type="text" id="subject" name="subject" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" class="form-control" 
                              placeholder="Your message here..." required></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary w-100">Send Message</button>
            </form>
        </div>
        
        <div class="col-md-6">
            <h3>Get in Touch</h3>
            
            <div class="card mb-3 h-50">
                <div class="card-body">
                    <h5>📞 WhatsApp</h5>
                    <p>
                        <a class="btn btn-gold" href="https://wa.me/919999999999" target="_blank">
                            Chat with us on WhatsApp
                        </a>
                    </p>
                </div>
            </div>
            
            <div class="card mb-3 h-50">
                <div class="card-body">
                    <h5>📧 Email</h5>
                    <p>hello@aurabyhoneyy.com</p>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
